# rustfmt.toml - Clean & Consistent Configuration

# ========== EDITOR BASICS ==========
max_width = 160
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"

# ========== IMPORTS ==========
imports_granularity = "Crate"
group_imports = "StdExternalCrate"
reorder_imports = true
reorder_modules = true
imports_indent = "Visual"
imports_layout = "HorizontalVertical"

# ========== FUNCTIONS ==========
fn_params_layout = "Tall"
fn_call_width = 160       # Break long function calls
fn_single_line = false    # Always multiline signatures

# ========== STRUCTS & ENUMS ==========
struct_lit_width = 80             # Break struct literals beyond this
struct_variant_width = 80
struct_lit_single_line = true     # Allow short structs on one line
struct_field_align_threshold = 20
enum_discrim_align_threshold = 20
use_field_init_shorthand = true

# ========== ARRAYS & COLLECTIONS ==========
array_width = 80
short_array_element_width_threshold = 10
overflow_delimited_expr = true

# ========== CONTROL FLOW ==========
brace_style = "PreferSameLine"
control_brace_style = "AlwaysNextLine"
single_line_if_else_max_width = 40
single_line_let_else_max_width = 40
force_multiline_blocks = false

# ========== MATCH EXPRESSIONS ==========
match_arm_leading_pipes = "Always"
match_block_trailing_comma = true
match_arm_blocks = true

# ========== COMMENTS & DOCS ==========
normalize_comments = true
normalize_doc_attributes = true
wrap_comments = true
comment_width = 100                # Slightly less than max_width
format_code_in_doc_comments = true

# ========== STRINGS & MACROS ==========
format_strings = true
format_macro_matchers = true
format_macro_bodies = true

# ========== WHERE CLAUSES ==========
where_single_line = false # Always break where clauses

# ========== SPACING & PUNCTUATION ==========
space_after_colon = true
spaces_around_ranges = true       # 0..10 not 0 .. 10
type_punctuation_density = "Wide"

# ========== TRAILING ELEMENTS ==========
trailing_comma = "Vertical"
trailing_semicolon = true

# ========== MISCELLANEOUS ==========
chain_width = 80
empty_item_single_line = false
force_explicit_abi = true
hex_literal_case = "Upper"
inline_attribute_width = 0        # Always break attributes
remove_nested_parens = true
reorder_impl_items = true
condense_wildcard_suffixes = true

# ========== UNSTABLE FEATURES ==========
unstable_features = true

# ========== Strings ====================
